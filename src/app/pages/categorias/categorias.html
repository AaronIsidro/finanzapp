<p-toast position="top-right" />

<div class="categorias">
  <div class="cabecera">
    <h2>🏷️ Categorías</h2>
    <p-button label="Nueva categoría" icon="pi pi-plus" (onClick)="abrirDialog()" />
  </div>

  <p-table [value]="categorias" stripedRows>
    <ng-template #header>
      <tr>
        <th style="width: 80px">Icono</th>
        <th>Nombre</th>
        <th style="width: 100px">Acción</th>
      </tr>
    </ng-template>
    <ng-template #body let-c>
      <tr>
        <td style="font-size: 1.5rem; text-align: center">{{ c.icono }}</td>
        <td>{{ c.nombre }}</td>
        <td>
          <button class="btn-borrar" (click)="eliminar(c.id)">🗑️ Borrar</button>
        </td>
      </tr>
    </ng-template>
    <ng-template #emptymessage>
      <tr>
        <td colspan="3" style="text-align:center; color:#94a3b8; padding:2rem">
          No hay categorías aún
        </td>
      </tr>
    </ng-template>
  </p-table>

  <p-dialog header="Nueva Categoría" [(visible)]="mostrarDialog" [modal]="true" [style]="{width: '350px'}">
    <div class="form">
      <label>Icono (emoji)</label>
      <input pInputText [(ngModel)]="nueva.icono" placeholder="Ej: 🍔" />

      <label>Nombre</label>
      <input pInputText [(ngModel)]="nueva.nombre" placeholder="Ej: Alimentación" />
    </div>

    <ng-template #footer>
      <p-button label="Cancelar" severity="secondary" (onClick)="mostrarDialog = false" />
      <p-button label="Guardar" (onClick)="guardar()" />
    </ng-template>
  </p-dialog>
</div>
